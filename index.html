<!DOCTYPE html>
<html>
<head>
  <title>Jack Jense Lawn & Can Cleaning</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: linear-gradient(to bottom, #1e3c72, #2a5298);
      background-size: cover;
      background-position: center;
    }

    .container {
      padding: 50px 20px;
    }

    h1 {
      font-size: 2.3em;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1em;
      margin: 8px 0;
    }

    .section {
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 26px;
      margin: 8px;
      background: #00ff88;
      color: black;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
    }

    .card {
      background: rgba(255,255,255,0.1);
      margin: 10px auto;
      padding: 15px;
      border-radius: 12px;
      max-width: 300px;
    }

    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
    }

    footer {
      margin-top: 40px;
      font-size: 0.9em;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Jack Jense Lawn & Can Cleaning</h1>
  <p>Serving Pleasant Grove, Utah</p>
  <p>Professional lawn mowing & trash can cleaning</p>

  <div class="section">
    <div class="card">🌿 Lawn mowing: $25+</div>
    <div class="card">🧼 Trash can cleaning: $20 per can</div>
  </div>

  <div class="section">
    <a class="btn" href="tel:3853126739">Call Now</a>
    <a class="btn" href="sms:3853126739">Text Me</a>
  </div>

  <div class="section">
    <p>✔ Reliable</p>
    <p>✔ Affordable</p>
    <p>✔ Fast service</p>
  </div>

  <!-- BOOKING FORM -->
  <div class="section">
    <h2>Book a Service</h2>

    <form action="https://formspree.io/f/YOURCODE" method="POST">
      <input type="text" name="name" placeholder="Your Name" required><br>
      <input type="tel" name="phone" placeholder="Your Phone" required><br>
      <textarea name="details" placeholder="What do you need done?" required></textarea><br>
      <button class="btn" type="submit">Submit Request</button>
    </form>
  </div>

  <!-- VENMO -->
  <div class="section">
    <h2>Pay with Venmo</h2>
   <a class="btn" href="https://venmo.com/Jack-Jense-1">Pay Here</a>
  </div>

  <footer>
    <p>Local & trusted service</p>
  </footer>

</div>

</body>
</html>
